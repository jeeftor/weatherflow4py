name: Release

on:
  push:
    branches:
      - master
      - websockets

permissions: write-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      id-token: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install prek
        run: uv tool install prek

      - name: Run verification checks
        run: make verify

      - name: Check if there is a parent commit
        id: check-parent-commit
        run: |
          echo "sha=$(git rev-parse --verify --quiet HEAD^)" >> $GITHUB_OUTPUT

      - name: Detect and tag new version
        id: check-version
        if: steps.check-parent-commit.outputs.sha
        uses: salsify/action-detect-and-tag-new-version@v2.0.3
        with:
          version-command: |
            bash -o pipefail -c "uv run python -c 'import tomllib; print(tomllib.load(open(\"pyproject.toml\", \"rb\"))[\"project\"][\"version\"])'"

      - name: Bump version for developmental release
        if: ${{ !steps.check-version.outputs.tag }}
        run: |
          # Extract current version
          current_version=$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          # Bump patch version
          IFS='.' read -r major minor patch <<< "$current_version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch.dev.$(date +%s)"
          # Update pyproject.toml with new version
          sed -i "s/version = \"$current_version\"/version = \"$new_version\"/" pyproject.toml

      - name: Build package
        run: uv build

      - name: Verify built package
        run: |
          cd /tmp
          uv run --isolated --no-project --with "$GITHUB_WORKSPACE"/dist/*.whl python -c "import pathlib; import weatherflow4py; package_path = pathlib.Path(weatherflow4py.__file__).resolve(); print(package_path); assert 'site-packages' in str(package_path), package_path"

      - name: Generate CHANGELOG.md
        if: steps.check-version.outputs.tag
        run: |
          uv tool run git-cliff --tag ${{ steps.check-version.outputs.tag }} -o CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for ${{ steps.check-version.outputs.tag }} [skip ci]"
          git push

      - name: Publish package on PyPI
        if: steps.check-version.outputs.tag
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish package on TestPyPI
        if: ${{ !steps.check-version.outputs.tag }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          verbose: false

      - name: Publish the release notes
        uses: release-drafter/release-drafter@v6.1.0
        with:
          publish: ${{ steps.check-version.outputs.tag != '' }}
          tag: ${{ steps.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
