name: Release

on:
  push:
    branches:
      - main
      - master
      - websockets
  workflow_dispatch:

permissions: write-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      id-token: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: |
          pip install uv
          uv --version
          cat pyproject.toml

      - name: Detect and tag new version
        id: check-version
        run: |
          git fetch --tags
          current_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          tag="v${current_version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — dev build"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Released version ${current_version}"
            git push origin "$tag"
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "Created and pushed tag $tag"
          fi

      - name: Bump version for developmental release
        if: ${{ !steps.check-version.outputs.tag }}
        run: |
          # Extract current version
          current_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          # Bump patch version
          IFS='.' read -r major minor patch <<< "$current_version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch.dev.$(date +%s)"
          # Update pyproject.toml with new version
          sed -i "s/version = \"$current_version\"/version = \"$new_version\"/" pyproject.toml

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify built package
        run: |
          uv pip install --system dist/*.whl

      - name: Generate CHANGELOG.md
        if: steps.check-version.outputs.tag
        run: |
          pip install git-cliff
          git-cliff --tag ${{ steps.check-version.outputs.tag }} -o CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for ${{ steps.check-version.outputs.tag }} [skip ci]"
          git push

      - name: Publish package on PyPI
        if: steps.check-version.outputs.tag
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish package on TestPyPI
        if: ${{ !steps.check-version.outputs.tag }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          verbose: false

      - name: Publish the release notes
        uses: release-drafter/release-drafter@v6.1.0
        with:
          publish: ${{ steps.check-version.outputs.tag != '' }}
          tag: ${{ steps.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}